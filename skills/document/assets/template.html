<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
    --max-width: 820px;
  }

  :root[data-theme="light"] {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --bg-tertiary: #eef1f5;
    --text: #1a1a1a;
    --text-secondary: #4a5568;
    --text-muted: #718096;
    --border: #e2e8f0;
    --accent: #2b6cb0;
    --accent-light: #ebf4ff;
    --severity-critical: #c53030;
    --severity-critical-bg: #fff5f5;
    --severity-significant: #c05621;
    --severity-significant-bg: #fffaf0;
    --severity-minor: #2b6cb0;
    --severity-minor-bg: #ebf8ff;
    --table-stripe: #f7fafc;
    --link: #2b6cb0;
    --link-hover: #1a4971;
    --shadow: rgba(0, 0, 0, 0.06);
  }

  :root[data-theme="dark"] {
    --bg: #1a1a1a;
    --bg-secondary: #242424;
    --bg-tertiary: #2e2e2e;
    --text: #e2e2e2;
    --text-secondary: #a0a0a0;
    --text-muted: #717171;
    --border: #333333;
    --accent: #b0b0b0;
    --accent-light: #2a2a2a;
    --severity-critical: #fc8181;
    --severity-critical-bg: #2d1b1b;
    --severity-significant: #f6ad55;
    --severity-significant-bg: #2d2415;
    --severity-minor: #a0a0a0;
    --severity-minor-bg: #282828;
    --table-stripe: #222222;
    --link: #e0c97f;
    --link-hover: #f0dca0;
    --shadow: rgba(0, 0, 0, 0.2);
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    margin: 0;
    padding: 2rem 1.5rem;
    transition: background 0.3s ease, color 0.3s ease;
  }

  .container {
    max-width: var(--max-width);
    margin: 0 auto;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: var(--text);
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    z-index: 100;
  }

  .theme-toggle:hover {
    background: var(--bg-tertiary);
  }

  /* Typography */
  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 0.5rem 0;
    color: var(--text);
  }

  h2 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 2.5rem 0 1rem 0;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 1.8rem 0 0.6rem 0;
    color: var(--text);
  }

  p {
    margin: 0 0 1rem 0;
    color: var(--text-secondary);
  }

  a {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }

  a:hover {
    color: var(--link-hover);
    border-bottom-color: var(--link-hover);
  }

  /* Metadata */
  .meta {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 2.5rem;
  }

  .meta strong {
    color: var(--text-secondary);
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.9rem;
  }

  th {
    background: var(--bg-secondary);
    font-weight: 600;
    text-align: left;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    color: var(--text);
  }

  td {
    padding: 0.65rem 1rem;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  tr:nth-child(even) td {
    background: var(--table-stripe);
  }

  /* Severity badges */
  .severity {
    display: inline-block;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.15rem 0.6rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .severity-critical {
    color: var(--severity-critical);
    background: var(--severity-critical-bg);
  }

  .severity-significant {
    color: var(--severity-significant);
    background: var(--severity-significant-bg);
  }

  .severity-minor {
    color: var(--severity-minor);
    background: var(--severity-minor-bg);
  }

  /* Issue cards */
  .issue {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem 2rem;
    margin: 1.5rem 0;
    box-shadow: 0 1px 3px var(--shadow);
  }

  .issue h2 {
    margin-top: 0;
    border-bottom: none;
    padding-bottom: 0;
  }

  .issue h3 {
    font-size: 1rem;
  }

  .issue-meta {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  /* Lists */
  ul, ol {
    padding-left: 1.5rem;
    color: var(--text-secondary);
  }

  li {
    margin-bottom: 0.35rem;
  }

  /* Code */
  code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--bg-tertiary);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
  }

  /* Horizontal rule */
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 3rem 0 1.5rem 0;
  }

  /* Footer */
  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
  }

  .footer a {
    color: var(--text-muted);
    border-bottom-color: var(--border);
  }

  .footer a:hover {
    color: var(--link);
  }

  /* Print */
  @media print {
    .theme-toggle { display: none; }
    body { padding: 0; }
    .issue { break-inside: avoid; }
  }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <span id="theme-icon"></span>
</button>

<div class="container">
  {{CONTENT}}
</div>

<script>
  function getDefaultTheme() {
    const hour = new Date().getHours();
    return (hour >= 7 && hour < 19) ? 'light' : 'dark';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('modularity-review-theme', theme);
    document.getElementById('theme-icon').textContent = theme === 'light' ? '☾' : '☀';
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    setTheme(current === 'light' ? 'dark' : 'light');
  }

  const saved = localStorage.getItem('modularity-review-theme');
  setTheme(saved || getDefaultTheme());
</script>
</body>
</html>
